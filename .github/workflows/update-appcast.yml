name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to process (e.g. v1.1.0)'
        required: true

jobs:
  update-appcast:
    runs-on: macos-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.8.0"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o sparkle.tar.xz
          file sparkle.tar.xz
          tar -xf sparkle.tar.xz -C .
          mkdir -p sparkle_tools/bin
          cp bin/generate_appcast sparkle_tools/bin/
          echo "GENERATE_APPCAST=sparkle_tools/bin/generate_appcast" >> $GITHUB_ENV

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p updater/releases
          gh release download "${{ github.event.release.tag_name || inputs.tag }}" \
            --pattern "*.zip" \
            --dir updater/releases \
            --repo ${{ github.repository }}

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" | \
            ${{ env.GENERATE_APPCAST }} \
              --ed-key-file - \
              --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name || inputs.tag }}/" \
              --link "https://github.com/${{ github.repository }}" \
              --output updater/appcast.xml \
              updater/releases

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updater/appcast.xml
          git diff --cached --quiet || git commit -m "chore: update appcast for ${{ github.event.release.tag_name || inputs.tag }}"
          git push origin main
